<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>站内消息</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div class="brand-copy">
        <span>墨言加速</span>
        <small>站内通知</small>
      </div>
    </div>
    <div class="nav-links">
      <a th:href="@{/user/dashboard}">首页</a>
      <a th:href="@{/user/tasks}">代挂任务</a>
      <a th:href="@{/user/orders}">购买套餐</a>
      <a class="active" th:href="@{/user/messages}">站内消息</a>
      <a th:href="@{/user/profile}">我的资料</a>
    </div>
  </div>
</div>

<div class="shell">
  <div class="card">
    <div class="section-head">
      <div>
        <div class="section-title">站内消息</div>
        <div class="muted">订单审核、系统通知、后台回执都会集中在这里。</div>
      </div>
      <span class="tag primary" th:text="${#lists.size(messages)} + ' 条'"></span>
    </div>
    <div class="message-list" th:if="${!#lists.isEmpty(messages)}">
      <div th:each="item : ${messages}" class="message-item">
        <div style="display:flex;justify-content:space-between;gap:12px;">
          <strong th:text="${item.title}"></strong>
          <span class="muted" th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
        </div>
        <div class="muted" style="margin-top:6px;" th:text="${item.content}"></div>
      </div>
    </div>
    <div class="empty-state" th:if="${#lists.isEmpty(messages)}">暂无站内消息</div>
  </div>
</div>
</body>
</html>
