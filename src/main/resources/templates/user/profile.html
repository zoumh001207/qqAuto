<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的资料</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div class="brand-copy">
        <span>墨言加速</span>
        <small>个人资料</small>
      </div>
    </div>
    <div class="nav-links">
      <a th:href="@{/user/dashboard}">首页</a>
      <a th:href="@{/user/tasks}">代挂任务</a>
      <a th:href="@{/user/orders}">购买套餐</a>
      <a th:href="@{/user/messages}">站内消息</a>
      <a class="active" th:href="@{/user/profile}">我的资料</a>
    </div>
  </div>
</div>

<div class="shell">
  <div th:replace="~{fragments/flash :: flash}"></div>

  <div class="page-grid grid-2">
    <div class="card">
      <div class="section-head">
        <div class="section-title">个人资料</div>
        <span class="tag primary">基础设置</span>
      </div>
      <form method="post" th:action="@{/user/profile}">
        <label>显示名称</label>
        <input type="text" name="displayName" th:value="${currentUser.displayName}">
        <label>QQ 号</label>
        <input type="text" name="qq" th:value="${currentUser.qqNumber}">
        <label>邮箱</label>
        <input type="email" name="email" th:value="${currentUser.email}">
        <button class="btn-primary" type="submit">保存资料</button>
      </form>
    </div>

    <div class="card">
      <div class="section-head">
        <div class="section-title">已接入账号</div>
        <span class="tag accent" th:text="${#lists.size(qqAccounts)} + ' 个 QQ'"></span>
      </div>
      <div class="qq-list" th:if="${!#lists.isEmpty(qqAccounts)}">
        <div th:each="item : ${qqAccounts}" class="qq-card">
          <div class="qq-avatar round">Q</div>
          <div class="qq-main">
            <div class="qq-title" th:text="${item.qqNumber}"></div>
            <div class="qq-meta">
              <span class="tag primary" th:text="${item.packageName}"></span>
              <span th:text="${item.nickname}"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="empty-state" th:if="${#lists.isEmpty(qqAccounts)}">还没有接入 QQ 账号。</div>
    </div>
  </div>
</div>
</body>
</html>
