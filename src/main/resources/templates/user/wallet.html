<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>钱包</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div class="brand-copy">
        <span>墨言加速</span>
        <small>余额与申请</small>
      </div>
    </div>
    <div class="nav-links">
      <a th:href="@{/user/dashboard}">首页</a>
      <a th:href="@{/user/orders}">购买套餐</a>
      <a class="active" th:href="@{/user/wallet}">钱包</a>
      <a th:href="@{/user/messages}">站内消息</a>
      <a th:href="@{/user/profile}">我的资料</a>
    </div>
  </div>
</div>

<div class="shell">
  <div th:replace="~{fragments/flash :: flash}"></div>

  <div class="page-grid grid-2">
    <div class="card">
      <div class="section-head">
        <div>
          <div class="section-title" th:text="'当前余额 ¥' + ${currentUser.balance}"></div>
          <div class="muted">充值和提现都走人工审核。</div>
        </div>
        <span class="tag primary">钱包中心</span>
      </div>
      <form method="post" th:action="@{/user/recharge}">
        <label>充值金额</label>
        <input type="number" step="0.01" name="amount">
        <label>渠道</label>
        <select name="channel">
          <option>微信</option>
          <option>支付宝</option>
          <option>QQ钱包</option>
          <option>银行卡</option>
        </select>
        <label>备注</label>
        <textarea name="note" rows="4"></textarea>
        <button class="btn-primary" type="submit">提交充值申请</button>
      </form>
    </div>

    <div class="card">
      <div class="section-head">
        <div class="section-title">提现申请</div>
        <span class="tag accent">人工审核</span>
      </div>
      <form method="post" th:action="@{/user/withdraw}">
        <label>提现金额</label>
        <input type="number" step="0.01" name="amount">
        <label>收款方式</label>
        <select name="channel">
          <option>微信</option>
          <option>支付宝</option>
          <option>QQ</option>
        </select>
        <label>收款账号</label>
        <input type="text" name="account">
        <button class="btn-secondary" type="submit">提交提现申请</button>
      </form>
    </div>
  </div>

  <div class="page-grid grid-2 space-top">
    <div class="table-card">
      <div class="table-header">
        <h3 style="margin:0;">充值记录</h3>
      </div>
      <table>
        <thead>
        <tr><th>ID</th><th>金额</th><th>渠道</th><th>状态</th></tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(recharges)}">
          <td colspan="4"><div class="empty-state">暂无充值申请</div></td>
        </tr>
        <tr th:each="item : ${recharges}">
          <td th:text="${item.id}"></td>
          <td th:text="'¥' + ${item.amount}"></td>
          <td th:text="${item.channel}"></td>
          <td th:text="${item.status}"></td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h3 style="margin:0;">提现记录</h3>
      </div>
      <table>
        <thead>
        <tr><th>ID</th><th>金额</th><th>渠道</th><th>状态</th></tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(withdrawals)}">
          <td colspan="4"><div class="empty-state">暂无提现申请</div></td>
        </tr>
        <tr th:each="item : ${withdrawals}">
          <td th:text="${item.id}"></td>
          <td th:text="'¥' + ${item.amount}"></td>
          <td th:text="${item.channel}"></td>
          <td th:text="${item.status}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
