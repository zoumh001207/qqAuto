<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>钱包</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<div class="shell">
  <div class="nav"><a th:href="@{/user/dashboard}">首页</a><a th:href="@{/user/orders}">订单</a><a th:href="@{/user/wallet}">钱包</a><a th:href="@{/user/messages}">消息</a><a th:href="@{/user/profile}">我的</a></div>
  <div th:replace="~{fragments/flash :: flash}"></div>
  <div class="grid grid-2">
    <div class="card">
      <h3>余额充值申请</h3>
      <p>当前余额：<strong th:text="${currentUser.balance}"></strong> 元</p>
      <form method="post" th:action="@{/user/recharge}">
        <label>金额</label><input type="number" step="0.01" name="amount">
        <label>渠道</label><select name="channel"><option>微信</option><option>支付宝</option><option>QQ钱包</option><option>银行卡</option></select>
        <label>备注</label><textarea name="note"></textarea>
        <button class="btn-primary" type="submit">提交充值申请</button>
      </form>
    </div>
    <div class="card">
      <h3>余额提现申请</h3>
      <form method="post" th:action="@{/user/withdraw}">
        <label>金额</label><input type="number" step="0.01" name="amount">
        <label>收款方式</label><select name="channel"><option>微信</option><option>支付宝</option><option>QQ</option></select>
        <label>收款账号</label><input type="text" name="account">
        <button class="btn-secondary" type="submit">提交提现申请</button>
      </form>
    </div>
  </div>
  <div class="grid grid-2 space-top">
    <div class="card">
      <h3>充值记录</h3>
      <table><thead><tr><th>ID</th><th>金额</th><th>渠道</th><th>状态</th></tr></thead><tbody><tr th:each="item : ${recharges}"><td th:text="${item.id}"></td><td th:text="${item.amount}"></td><td th:text="${item.channel}"></td><td th:text="${item.status}"></td></tr></tbody></table>
    </div>
    <div class="card">
      <h3>提现记录</h3>
      <table><thead><tr><th>ID</th><th>金额</th><th>渠道</th><th>状态</th></tr></thead><tbody><tr th:each="item : ${withdrawals}"><td th:text="${item.id}"></td><td th:text="${item.amount}"></td><td th:text="${item.channel}"></td><td th:text="${item.status}"></td></tr></tbody></table>
    </div>
  </div>
</div>
</body>
</html>
