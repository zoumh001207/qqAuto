<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="shell" style="padding-top:20px;">
  <div th:replace="~{fragments/flash :: flash}"></div>

  <div class="monitor-shell">
    <aside class="monitor-sidebar">
      <div class="brand">
        <div class="brand-logo">M</div>
        <div>管理后台<small>运行监控中心</small></div>
      </div>
      <nav class="monitor-nav">
        <a class="active" th:href="@{/admin}">运行监控</a>
        <a href="#announcements">公告管理</a>
        <a href="#products">套餐配置</a>
        <a href="#orders">订单管理</a>
        <a href="#messages">消息下发</a>
        <a th:href="@{/user/dashboard}">返回前台</a>
      </nav>
    </aside>

    <main class="monitor-main">
      <div class="stat-grid">
        <div class="card stat-card">
          <div class="stat-label">总用户数</div>
          <div class="stat-value" th:text="${users.size()}"></div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">接入 QQ 数</div>
          <div class="stat-value" th:text="${qqAccounts.size()}"></div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">任务总数</div>
          <div class="stat-value" th:text="${totalTaskExecutions}"></div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">已完成任务</div>
          <div class="stat-value" th:text="${completedTaskExecutions}"></div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <h3>账号运行状态</h3>
        </div>
        <table>
          <thead>
          <tr>
            <th>QQ号</th>
            <th>归属用户</th>
            <th>套餐</th>
            <th>状态</th>
            <th>到期时间</th>
            <th>最后执行</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="item : ${qqAccounts}">
            <td th:text="${item.qqNumber}"></td>
            <td th:text="${item.user.username}"></td>
            <td th:text="${item.packageName}"></td>
            <td>
              <span class="tag success" th:if="${item.status.name() == 'RUNNING'}">运行中</span>
              <span class="tag warning" th:if="${item.status.name() == 'PENDING'}">待执行</span>
              <span class="tag danger" th:if="${item.status.name() == 'ERROR' || item.status.name() == 'EXPIRED'}" th:text="${item.status.name()}"></span>
            </td>
            <td th:text="${#temporals.format(item.expireAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${#temporals.format(item.lastRunAt, 'yyyy-MM-dd HH:mm')}"></td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="page-grid grid-2 space-top">
        <div class="card" id="announcements">
          <h3>发布公告</h3>
          <form method="post" th:action="@{/admin/announcement}">
            <label>标题</label>
            <input type="text" name="title">
            <label>内容</label>
            <textarea name="content" rows="5"></textarea>
            <label><input type="checkbox" name="published" value="true" checked style="width:auto;margin-right:8px;">发布</label>
            <label><input type="checkbox" name="pinned" value="true" style="width:auto;margin-right:8px;">置顶</label>
            <button class="btn-primary" type="submit">保存公告</button>
          </form>
        </div>

        <div class="card" id="products">
          <h3>新增套餐</h3>
          <form method="post" th:action="@{/admin/product}">
            <label>套餐名称</label>
            <input type="text" name="name">
            <label>分类</label>
            <input type="text" name="category" value="代挂套餐">
            <label>版本标记</label>
            <input type="text" name="versionTag">
            <label>摘要</label>
            <textarea name="summary" rows="4"></textarea>
            <label>价格</label>
            <input type="number" step="0.01" name="price">
            <label>时长(天)</label>
            <input type="number" name="durationDays">
            <label><input type="checkbox" name="active" value="true" checked style="width:auto;margin-right:8px;">启用</label>
            <label><input type="checkbox" name="featured" value="true" style="width:auto;margin-right:8px;">推荐</label>
            <button class="btn-primary" type="submit">保存套餐</button>
          </form>
        </div>
      </div>

      <div class="table-card space-top" id="orders">
        <div class="table-header">
          <h3>订单管理</h3>
        </div>
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>用户</th>
            <th>套餐</th>
            <th>金额</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="item : ${orders}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.user.username}"></td>
            <td th:text="${item.product.name}"></td>
            <td th:text="${item.amount}"></td>
            <td th:text="${item.status}"></td>
            <td>
              <form th:if="${item.status.name() != 'COMPLETED'}" th:action="@{'/admin/order/' + ${item.id} + '/approve'}" method="post">
                <button class="btn-soft" type="submit">确认开通</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="card space-top" id="messages">
        <h3>发送站内消息</h3>
        <form method="post" th:action="@{/admin/message}">
          <label>目标用户</label>
          <select name="userId">
            <option th:each="item : ${users}" th:value="${item.id}" th:text="${item.username + ' / ' + item.qqNumber}"></option>
          </select>
          <label>标题</label>
          <input type="text" name="title">
          <label>内容</label>
          <textarea name="content" rows="4"></textarea>
          <button class="btn-primary" type="submit">发送消息</button>
        </form>
      </div>
    </main>
  </div>
</div>
</body>
</html>
