<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">M</div>
      <div>
        <strong>莫言加速</strong>
        <div class="muted">QQ 自动任务自用版</div>
      </div>
    </div>
    <h1>登录后台与用户面板</h1>
    <p>当前版本按你提供的原型重构，先交付账号管理、任务面板、套餐购买和后台监控。</p>
    <div th:replace="~{fragments/flash :: flash}"></div>
    <form th:action="@{/login}" method="post">
      <label>用户名</label>
      <input type="text" name="username" required>
      <label>密码</label>
      <input type="password" name="password" required>
      <button class="btn-primary" type="submit">登录</button>
    </form>
    <p class="muted">默认管理员：admin / zmh0012078070</p>
    <p class="muted"><a th:href="@{/register}">注册账号</a> · <a th:href="@{/forgot-password}">找回密码</a></p>
  </div>
</div>
</body>
</html>
