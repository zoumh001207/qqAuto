<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">M</div>
      <div>
        <strong>莫言加速</strong>
        <div class="muted">密码找回说明</div>
      </div>
    </div>
    <h1>找回密码</h1>
    <p th:text="${notice}"></p>
    <p class="muted">按你的要求，这个版本不接短信和邮箱验证。当前统一走后台人工重置密码。</p>
    <a class="btn-soft" th:href="@{/login}">返回登录</a>
  </div>
</div>
</body>
</html>
